name = "worker-cms-plugin-import-export"
main = "src/index.ts"
compatibility_date = "2026-07-14"
compatibility_flags = ["nodejs_compat", "global_fetch_strictly_public"]

# Admin view templates (JSON templates + Liquid sections, rendered by the CMS's
# client-view resolver). The Worker runs first for every request and reads these
# internally via the VIEWS binding, so the files are never served publicly.
[assets]
directory = "./views"
binding = "VIEWS"
run_worker_first = true

[version_metadata]
binding = "CF_VERSION_METADATA"

# The CMS forwards this secret on every admin call, and this plugin sends it
# back on every Plugin API call. Set it to THIS plugin's dedicated secret —
# shown in the CMS admin under Plugins → (this plugin) → Edit → Shared secret:
#   wrangler secret put PLUGIN_SECRET
#
# Local dev (.dev.vars):
#   CMS_URL=http://localhost:8787
#   PLUGIN_SECRET=<must match the host CMS's .dev.vars PLUGIN_SECRET>
